<div class="sidebar">
  <nav class="sidebar__nav">
    
    <a routerLink="/dashboard" routerLinkActive="active" class="sidebar__link">
      Dashboard
    </a>

    @if (isAdmin()) {
      <a routerLink="/roles/add" routerLinkActive="active" class="sidebar__link">
        Add Role
      </a>
    }

    @if (isStaff()) {
      <a routerLink="/users/add" routerLinkActive="active" class="sidebar__link">
        Add User
      </a>
    }

    @if (isStaff() || isStudent()) {
      <a routerLink="/timesheet" routerLinkActive="active" class="sidebar__link">
        Timesheet
      </a>
    }

    <a routerLink="/profile" routerLinkActive="active" class="sidebar__link">
      Profile
    </a>

  </nav>
</div>
